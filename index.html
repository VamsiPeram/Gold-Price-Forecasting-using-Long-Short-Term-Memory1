<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Price Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eaf1f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #f2f2f2;
            padding: 35px 40px;
            border-radius: 15px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);
            width: 420px;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #2d2d2d;
            font-size: 28px;
            font-weight: bold;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-size: 16px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #c8c8c8;
            box-sizing: border-box;
            font-size: 15px;
            background: white;
            outline: none;
        }

        input:focus {
            border-color: #0077cc;
            box-shadow: 0 0 4px rgba(0, 119, 204, 0.3);
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            background-color: #0077cc;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #005fa3;
        }

        .result {
            margin-top: 20px;
            padding: 12px;
            background: #ffffff;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            color: #222;
            border: 1px solid #ddd;
        }

        .error {
            margin-top: 20px;
            padding: 12px;
            background: #ffe6e6;
            border: 1px solid #ffb3b3;
            border-radius: 8px;
            color: #cc0000;
            text-align: center;
            font-weight: bold;
        }

        @media (max-width: 500px) {
            .container {
                width: 100%;
                padding: 25px 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stock Price Predictor</h1>

        <form method="POST">
            <label for="Open">Open:</label>
            <input type="number" step="any" id="Open" name="Open" placeholder="Open" required>

            <label for="High">High:</label>
            <input type="number" step="any" id="High" name="High" placeholder="High" required>

            <label for="Low">Low:</label>
            <input type="number" step="any" id="Low" name="Low" placeholder="Low" required>

            <label for="Adj_Close">Adj Close:</label>
            <input type="number" step="any" id="Adj_Close" name="Adj_Close" placeholder="Adj Close" required>

            <label for="Volume">Volume:</label>
            <input type="number" step="any" id="Volume" name="Volume" placeholder="Volume" required>

            <label for="SP_open">SP open:</label>
            <input type="number" step="any" id="SP_open" name="SP_open" placeholder="SP open" required>

            <label for="SP_high">SP high:</label>
            <input type="number" step="any" id="SP_high" name="SP_high" placeholder="SP high" required>

            <label for="SP_low">SP low:</label>
            <input type="number" step="any" id="SP_low" name="SP_low" placeholder="SP low" required>

            <label for="SP_close">SP close:</label>
            <input type="number" step="any" id="SP_close" name="SP_close" placeholder="SP close" required>

            <button type="submit">Predict</button>
        </form>

        {% if prediction is not none %}
            <div class="result">
                Predicted Close Price: <strong>{{ prediction }}</strong>
            </div>
        {% endif %}

        {% if error %}
            <div class="error">
                Error: {{ error }}
            </div>
        {% endif %}
    </div>
</body>
</html>
